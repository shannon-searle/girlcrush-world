<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shannon Searle</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #230d0d;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
        }

        .password-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        input {
            background: none;
            border: none;
            border-bottom: 1px solid #e166a0;
            color: #f8abf3;
            font-family: "Press Start 2P", system-ui;
            font-size: 12px;
            padding: 8px;
            outline: none;
            text-align: center;
        }

        button {
            background: none;
            border: none;
            color: #f8abf3;
            font-family: "Press Start 2P", system-ui;
            font-size: 12px;
            cursor: pointer;
            padding: 8px 16px;
        }

        button:hover {
            background: #e166a0;
            color: #231111;
        }

        p {
            color: #f8abf3;
            font-family: "Press Start 2P", system-ui;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="password-container">
        <p>enter password</p>
        <input type="password" id="passwordInput" onkeydown="if(event.key==='Enter') checkPassword()" />
        <button onclick="checkPassword()">enter</button>
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === 'shantheman') {
                sessionStorage.setItem('verified', 'true');
                window.location.replace('index.html');
            } else {
                alert('wrong password');
            }
        }
    </script>
</body>
</html>
